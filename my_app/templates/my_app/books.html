<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Books</title>
</head>
<body>
	<h1> Add a Book</h1>

	<form action="/books/create/" method="POST">
		{% csrf_token %}
		<label>Title:</label>
		<input type="text" name="title" required>
		<br>
		<label>Description</label>
		<textarea name="description"></textarea>
		<br>
		<button type="submit">Add</button>
	</form>

	<hr>

	<table border="1">
		<thead>
			<tr>
				<th>ID</th>
				<th>Name</th>
				<th>Action</th>
			</tr>
		</thead>
		<tbody>
			{% for book in books %}
			<tr>
				<td>{{ book.id }}</td>
				<td>{{ book.title }}</td>
				<td> <a href="/books/{{ book.id }}">View</a></td>
			</tr>
			{% endfor %}
		</tbody>
	</table>

	
</body>
</html>
